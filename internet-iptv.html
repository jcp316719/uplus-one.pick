/* 아이콘 유닛 HTML */
function buildIcon(ic) {
  if (!ic) return '';
  if (ic.type === 'speed') {
    return '<div class="icon-unit">' +
      '<div class="icon-svg-wrap">' + svgRouter() + '</div>' +
      '<span class="icon-label-text" style="color:#E6007E;">' + ic.value + '</span>' +
      '</div>';
  }
  if (ic.type === 'tv') {
    return '<div class="icon-unit">' +
      '<div class="icon-svg-wrap tv">' + svgTV() + '</div>' +
      '<span class="icon-label-text tv" style="color:#0ea5e9;">' + ic.value + '</span>' +
      '</div>';
  }
  if (ic.type === 'ott') {
    var sub = ic.value === 'Disney' ? '<span style="font-size:9px;font-weight:600;color:#113CCF;letter-spacing:0.5px;margin-top:-4px;display:block;">스탠다드</span>' : '';
    return '<div class="icon-unit-ott">' +
      '<div class="icon-ott-logo">' +
        '<span class="chip-ott-text" style="color:' + (ic.color || '#111') + ';">' + ic.value + '</span>' +
      '</div>' +
      sub +
      '</div>';
  }
  if (ic.type === 'hwanseung') {
    return '<div class="icon-unit">' +
      '<div class="icon-svg-wrap" style="width:72px;height:35px;">' + svgHwanseung() + '</div>' +
      '<span class="icon-label-text" style="color:#888;font-weight:600;font-size:9px;white-space:normal;text-align:center;line-height:1.4;max-width:72px;">8개 주요 방송사<br>자유이용권을<br>바꿔가며 이용</span>' +
      '</div>';
  }
  return '';
}

/* 카드 빌드 */
function buildCard(card) {
  var div = document.createElement('div');
  div.className = 'plan-card' + (card.badges.indexOf('event') >= 0 ? ' event-card' : '');
  div.id = card.id;

  var badgeHtml = '';
  card.badges.forEach(function(key) {
    var def = null;
    for (var i=0; i<BADGE_DEFS.length; i++) { if (BADGE_DEFS[i].key === key) { def = BADGE_DEFS[i]; break; } }
    if (def) {
      badgeHtml += '<span class="badge ' + def.cls + '" onclick="if(editMode)openBadgeModal(\'' + card.id + '\')">' + def.label + '</span>';
      if (key === 'event') {
        badgeHtml += '<span class="event-period' + (editMode ? ' editable' : '') + '" contenteditable="' + editMode + '" onblur="saveField(\'' + card.id + '\',\'eventPeriod\',this.textContent)">' + (card.eventPeriod || (editMode ? '기간 입력' : '')) + '</span>';
      }
    }
  });
  var badgeAddBtn = '<button class="badge-add-btn" onclick="openBadgeModal(\'' + card.id + '\')">+ 배지</button>';

  var iconLeft  = buildIcon(card.iconLeft);
  var iconRight = card.iconRight ? '<span class="icon-combo-plus">+</span>' + buildIcon(card.iconRight) : '';

  div.innerHTML =
    '<button class="card-delete-btn" onclick="deleteCard(\'' + card.id + '\')" style="display:none">✕</button>' +

    '<div class="badge-row" id="badges-' + card.id + '">' + badgeHtml + badgeAddBtn + '</div>' +
    '<div class="icon-combo">' + iconLeft + iconRight + '</div>' +
    '<span class="plan-name-el editable" contenteditable="' + editMode + '" onblur="saveField(\'' + card.id + '\',\'name\',this.textContent)">' + card.name + '</span>' +
    '<div class="price-block">' +
      '<div class="price-normal editable" contenteditable="' + editMode + '" onblur="saveField(\'' + card.id + '\',\'normalPrice\',this.textContent)">' + card.normalPrice + '</div>' +
      '<div class="price-combo-label editable" contenteditable="' + editMode + '" onblur="saveField(\'' + card.id + '\',\'comboLabel\',this.textContent)">' + card.comboLabel + '</div>' +
      '<div class="price-combo-val">월 <em class="editable" contenteditable="' + editMode + '" onblur="saveField(\'' + card.id + '\',\'comboPrice\',this.textContent)">' + card.comboPrice + '</em></div>' +
      '<div class="price-period editable" contenteditable="' + editMode + '" onblur="saveField(\'' + card.id + '\',\'period\',this.textContent)">' + card.period + '</div>' +
      '<div class="price-gift editable" contenteditable="' + editMode + '" onblur="saveField(\'' + card.id + '\',\'gift\',this.textContent)">' + card.gift + '</div>' +
    '</div>';

  if (editMode) div.querySelector('.card-delete-btn').style.display = 'flex';
  return div;
}

/* 렌더 */
function renderAll() {
  var list = document.getElementById('planList');
  list.innerHTML = '';
  var filtered = cards.filter(function(c) {
    if (c.category.indexOf('hidden') >= 0) return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'speed100') return c.iconLeft && c.iconLeft.value === '100M';
    if (currentFilter === 'speed500') return c.iconLeft && c.iconLeft.value === '500M';
    if (currentFilter === 'speed1g')  return c.iconLeft && c.iconLeft.value === '1G';
    return c.category.indexOf(currentFilter) >= 0;
  });
  // 이벤트 ON 또는 EVENT 배지 카드 맨 앞으로
  filtered.sort(function(a, b) {
    var aEvent = a.badges.indexOf('event') >= 0;
    var bEvent = b.badges.indexOf('event') >= 0;
    if (aEvent && !bEvent) return -1;
    if (!aEvent && bEvent) return 1;
    return 0;
  });
  filtered.forEach(function(card) { list.appendChild(buildCard(card)); });
  if (editMode) {
    var addBtn = document.createElement('div');
    addBtn.className = 'add-card-btn';
    addBtn.textContent = '＋ 상품 추가';
    addBtn.onclick = addCard;
    list.appendChild(addBtn);
  }
}

/* 필터 */
function setFilter(val, el) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  renderAll();
}

function saveField(cardId, field, val) {
  for (var i=0; i<cards.length; i++) { if (cards[i].id === cardId) { cards[i][field] = val.trim(); break; } }
}

/* 배지 모달 */
function openBadgeModal(cardId) {
  if (!editMode) return;
  currentBadgeCardId = cardId;
  var card = null;
  for (var i=0; i<cards.length; i++) { if (cards[i].id === cardId) { card = cards[i]; break; } }
  var opts = document.getElementById('badgeOptions');
  opts.innerHTML = '';
  BADGE_DEFS.forEach(function(def) {
    var isOn = card.badges.indexOf(def.key) >= 0;
    var d = document.createElement('div');
    d.className = 'badge-option';
    d.innerHTML = '<span class="badge-option-label">' + def.label + '</span>' +
      '<div class="badge-option-toggle ' + (isOn?'on':'') + '" id="btoggle-' + def.key + '" onclick="toggleBadge(\'' + cardId + '\',\'' + def.key + '\')"></div>';
    opts.appendChild(d);
  });
  document.getElementById('badgeModalOverlay').classList.add('show');
}
function closeBadgeModal() {
  document.getElementById('badgeModalOverlay').classList.remove('show');
  if (currentBadgeCardId) renderAll();
}
function toggleBadge(cardId, key) {
  var card = null;
  for (var i=0; i<cards.length; i++) { if (cards[i].id === cardId) { card = cards[i]; break; } }
  var idx = card.badges.indexOf(key);
  if (idx >= 0) card.badges.splice(idx,1); else card.badges.push(key);
  var toggle = document.getElementById('btoggle-' + key);
  if (toggle) toggle.classList.toggle('on', card.badges.indexOf(key) >= 0);
}

  clearTimeout(adminTapTimer);
  adminTapTimer = setTimeout(() => { adminTapCount = 0; }, 2000);
  if (adminTapCount >= 5) { adminTapCount = 0; openPwModal(); }
}


// ── HTML 저장 기능 ──
function saveHTML() {
  const clone = document.documentElement.cloneNode(true);
  clone.querySelector('body').classList.remove('edit-mode');
  clone.querySelectorAll('[contenteditable]').forEach(el => el.setAttribute('contenteditable', 'false'));
  // 편집 툴바 상태 초기화
  const toolbar = clone.querySelector('#editToolbar');
  if (toolbar) toolbar.className = 'edit-toolbar';
  const editBtn = clone.querySelector('#editBtn');
  if (editBtn) { editBtn.textContent = '편집 시작'; editBtn.style.background = 'rgb(85, 85, 85)'; }
  const toolbarLabel = clone.querySelector('#toolbarLabel');
  if (toolbarLabel) toolbarLabel.textContent = '✏️ 관리자 편집 모드';
  const saveBtn2 = clone.querySelector('#saveBtn');
  if (saveBtn2) saveBtn2.style.display = 'none';
  // cards 데이터 저장
  try {
    const cardsData = JSON.stringify(cards);
    const existingScript = clone.querySelector('script[data-cards]');
    if (existingScript) existingScript.remove();
    const dataScript = clone.ownerDocument.createElement('script');
    dataScript.setAttribute('data-cards', '1');
    dataScript.textContent = 'window.__savedCards = ' + cardsData + ';';
    clone.querySelector('head').appendChild(dataScript);
  } catch(e) {}
  const html = '<!DOCTYPE html>\n' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = document.title.replace(/[^a-zA-Z0-9가-힣]/g, '_') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
